<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="/">
                <span class="brand-mark">IV</span>
                <span>Inventory</span>
            </a>
            <div class="nav-links">
                {% if current_user_name %}
                <a class="{{ 'active' if request.path.startswith('/cars') else '' }}" href="/cars">Cars</a>
                <a class="{{ 'active' if request.path.startswith('/categories') else '' }}" href="/categories">Categories</a>
                <a class="{{ 'active' if request.path.startswith('/users') else '' }}" href="/users">Users</a>
                <a href="/logout">Logout</a>
                {% else %}
                <a class="{{ 'active' if request.path.startswith('/login') else '' }}" href="/login">Login</a>
                <a class="{{ 'active' if request.path.startswith('/register') else '' }}" href="/register">Register</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main class="page-shell">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
            <section class="flash-panel">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>

</html>

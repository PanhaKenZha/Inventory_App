{% extends "base.html" %}

{% block title %}User Details{% endblock %}

{% block content %}
    <section class="page-header">
        <div>
            <p class="eyebrow">People</p>
            <h1>User Details</h1>
        </div>
    </section>

    <section class="card">
        {% if user %}
        <dl class="detail-list">
            <div>
                <dt>Name</dt>
                <dd>{{ user.name }}</dd>
            </div>
            <div>
                <dt>Email</dt>
                <dd>{{ user.email }}</dd>
            </div>
            <div>
                <dt>Phone</dt>
                <dd>{{ user.phone }}</dd>
            </div>
        </dl>
        {% else %}
        <p>User not found.</p>
        {% endif %}
        <div class="actions">
            <a class="button" href="/users">Back to Users</a>
        </div>
    </section>
{% endblock %}
